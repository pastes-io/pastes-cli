name: test

# Runs only when asked: manually from the Actions tab, or as the gate that
# release.yml calls before publishing.
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The CLI shells out for the clipboard and the browser, so the
        # differences between platforms are worth covering.
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm test
        env:
          # Tests spin up a local mock API; never let one launch a real browser.
          PASTES_NO_BROWSER: '1'
