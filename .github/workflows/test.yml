name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The CLI shells out for the clipboard and the browser, so the
        # differences between platforms are worth covering.
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 24]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm test
        env:
          # Tests spin up a local mock API; never let one launch a real browser.
          PASTES_NO_BROWSER: '1'
