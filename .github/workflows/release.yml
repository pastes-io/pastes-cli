name: release

# Manual only. Bump "version" in package.json, merge it, then run this.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Build and pack, but do not publish or tag'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # Publishing an unverified build is the one thing worth being slow about.
  test:
    uses: ./.github/workflows/test.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag and GitHub release
      id-token: write # npm provenance attestation
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - id: meta
        name: Read the package being released
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing $name@$version"

      - name: Fail early if this version is already on npm
        run: |
          name=${{ steps.meta.outputs.name }}
          version=${{ steps.meta.outputs.version }}
          # `npm view --json` prints its own 404 as a JSON object on stdout, so
          # neither its output nor its exit code distinguishes "not published"
          # from "published". Ask the registry instead: 200 means this exact
          # version exists, 404 means it does not.
          status=$(curl -sS -o /dev/null -w '%{http_code}' "https://registry.npmjs.org/$name/$version")
          case "$status" in
            404) echo "$name@$version is not on npm yet, proceeding." ;;
            200) echo "$name@$version is already published. Bump the version in package.json first."; exit 1 ;;
            # Never fall through to publish on an inconclusive answer.
            *)   echo "Unexpected registry response $status for $name@$version, aborting."; exit 1 ;;
          esac

      - run: npm install
      - run: npm run build

      - name: Pack and show exactly what will ship
        run: |
          npm pack
          echo "--- tarball contents ---"
          tar -tzf "${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.version }}.tgz"

      - name: Publish to npm
        if: ${{ !inputs.dry-run }}
        # --provenance attests that this tarball was built from this repo at
        # this commit, which anyone can verify on the npm package page.
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag the release and attach the published tarball
        if: ${{ !inputs.dry-run }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          name=${{ steps.meta.outputs.name }}
          version=${{ steps.meta.outputs.version }}
          gh release create "v$version" "$name-$version.tgz" \
            --title "v$version" \
            --generate-notes
